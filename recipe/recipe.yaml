schema_version: 1

context:
  version: "1.1.2"
  python_min: "3.11"
  
package:
  name: geolibre
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/geolibre/geolibre-${{ version }}.tar.gz
  sha256: 541927d8af34e328f50a67cf7ea80dbc52413f92a19f692f0d0e462969de50e2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - anywidget >=0.9
    - traitlets >=5

tests:
  - python:
      imports:
        - geolibre
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://geolibre.app
  summary: 'GeoLibre in Jupyter: the full GeoLibre GIS app as an anywidget, with a leafmap-style Python API.'
  description: 'GeoLibre in Jupyter: the full GeoLibre GIS app as an anywidget, with a leafmap-style Python API.'
  license: MIT
  license_file: LICENSE
  documentation: https://geolibre.app
  repository: https://github.com/opengeos/GeoLibre

extra:
  recipe-maintainers:
    - giswqs
