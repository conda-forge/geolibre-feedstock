schema_version: 1

context:
  version: "1.6.0"
  python_min: "3.11"
package:
  name: geolibre
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/geolibre/geolibre-${{ version }}.tar.gz
  sha256: a57c181aa87329a8f57ecdfaa7daa1376e74052584f2d7eef7e26f6513004eae

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - anywidget >=0.9
    - traitlets >=5
    - jupyter-ui-poll

tests:
  - python:
      imports:
        - geolibre
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://geolibre.app
  summary: 'GeoLibre in Jupyter: the full GeoLibre GIS app as an anywidget, with a leafmap-style Python API.'
  description: 'GeoLibre in Jupyter: the full GeoLibre GIS app as an anywidget, with a leafmap-style Python API.'
  license: MIT
  license_file: LICENSE
  documentation: https://geolibre.app
  repository: https://github.com/opengeos/GeoLibre

extra:
  recipe-maintainers:
    - giswqs
